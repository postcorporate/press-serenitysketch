# GitHub Pages cannot serve Git LFS pointer files as images/video; checkout must use LFS.
# After merging, set repo Settings → Pages → Build and deployment → Source: GitHub Actions.
name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Assemble site
        run: |
          mkdir -p site
          cp index.html site/
          cp -r assets styles site/
          if [ -f CNAME ]; then cp CNAME site/; fi
          touch site/.nojekyll

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
